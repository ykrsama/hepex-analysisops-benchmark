id: host_assess_hepex_bench
name: HEP-ex AnalysisOps assessment host
description: >
  Hosts and evaluates HEP-ex AnalysisOps benchmark tasks.
  Accepts an EvalRequest (participants + config), runs tasks
  in mock mode or by calling a purple agent, scores submissions,
  and emits per-task artifacts plus a final summary.

tags:
  - agentbeats
  - benchmark
  - evaluation
  - green-agent
  - hep
  - analysisops
  - atlas-open-data

examples:
  - |
    Single-task Hyy V5 L1 evaluation with a shared input mount
    {
      "participants": {
        "purple_agent": "http://purple-agent:9009/"
      },
      "config": {
        "data_dir": "/tmp/atlas_data_cache",
        "task_dirs": ["tasks_public/t002_hyy_v5_l1"],
        "input_access_mode": "scenario_shared_mount",
        "shared_input_dir": "/shared/hepex/input/2025e-13tev-beta/data/GamGam",
        "input_manifest_path": "/shared/hepex/input/2025e-13tev-beta/data/GamGam/input_manifest.json",
        "allow_green_download": false
      }
    }
