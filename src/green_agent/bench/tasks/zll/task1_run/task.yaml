task_id: 1
task_name: zll_run_pipeline
version: 0.1

description: >
  Run the provided Z→ℓℓ analysis pipeline to produce the required artifacts.

wiki: |
  You are participating in the HEPEx AnalysisOps benchmark (Z→ℓℓ).
  This task evaluates your ability to execute an existing analysis workflow,
  generate required artifacts, and validate the outputs.

  Goal:
  - Run the provided analysis script(s) to produce:
    1) fit_results.json
    2) mll_fit.png

  Constraints:
  - Do not download data from the internet yourself.
    The benchmark environment provides input data after preparation.
  - You may inspect files, run commands, and (if necessary) make minimal fixes
    to ensure the pipeline runs end-to-end.

interaction_protocol:
  response_wrapper: { start_tag: "<json>", end_tag: "</json>" }
  respond_action_name: "respond"
  max_num_steps: 20
  notes: |
    Use at most one tool call per step.
    Always return exactly one <json>...</json> block per message.

tools_info:
  - name: "run"
    description: "Run a shell command in the sandbox workspace."
    kwargs_schema:
      cmd: { type: "string", description: "Shell command to execute." }
      cwd: { type: "string", description: "Working directory relative to sandbox root.", default: "." }
      timeout_sec: { type: "number", description: "Timeout in seconds.", default: 120 }

  - name: "read_file"
    description: "Read a text file from the sandbox workspace."
    kwargs_schema:
      path: { type: "string", description: "Path relative to sandbox root." }

  - name: "list_dir"
    description: "List files under a directory in the sandbox workspace."
    kwargs_schema:
      path: { type: "string", description: "Directory path relative to sandbox root.", default: "." }

  - name: "file_exists"
    description: "Check whether a file exists in the sandbox workspace."
    kwargs_schema:
      path: { type: "string", description: "Path relative to sandbox root." }

  - name: "hash_file"
    description: "Compute SHA256 of a file."
    kwargs_schema:
      path: { type: "string", description: "Path relative to sandbox root." }

inputs:
  data:
    - path: data/zll_events.root
      acquisition:
        method: fetch_script
        script: scripts/fetch_zll_data.sh
        url_env: ATLAS_ZLL_URL
        sha256_env: ATLAS_ZLL_SHA256

  scripts:
    - path: analysis/run_analysis.py

expected_outputs:
  fit_results:
    path: fit_results.json
    schema:
      mZ_hat: float
      sigma_hat: float
      yield_hat: float
      chi2_ndf: float

  plot:
    path: mll_fit.png

scoring:
  metrics:
    mZ_hat:
      reference: 91.2
      tolerance: 1.0
      weight: 0.4
    sigma_hat:
      tolerance: 0.5
      weight: 0.2
  artifacts:
    files_exist:
      weight: 0.2
    plot_generated:
      weight: 0.2

runner_hints:
  runtime_limit_sec: 900
  seed: 123
  data_policy: "fetch_by_benchmark"
  recommended_entrypoint: "python analysis/run_analysis.py"
