task_id: 2
task_name: zll_patch_missing_fit
version: 0.1

description: >
  Repair a partially broken Z→ℓℓ analysis pipeline by filling in a missing code block,
  then run the pipeline to produce valid artifacts.

wiki: |
  You are participating in the HEPEx AnalysisOps benchmark (Z→ℓℓ).
  This task evaluates your ability to debug and maintain analysis code.

  Scenario:
  - The repository contains a Z→ℓℓ analysis pipeline, but a critical code block
    has been removed on purpose.
  - Your job is to identify the missing piece, implement a correct replacement,
    and run the pipeline to generate the required outputs.

  Goal outputs:
  - fit_results.json (must satisfy schema)
  - mll_fit.png

  Hint:
  - Start by running the pipeline entrypoint to reproduce the failure.
  - Locate the missing/placeholder section (e.g. TODO / NotImplementedError).
  - Implement the missing logic in a minimal, robust way.

interaction_protocol:
  response_wrapper: { start_tag: "<json>", end_tag: "</json>" }
  respond_action_name: "respond"
  max_num_steps: 30
  notes: |
    Use at most one tool call per step.
    Always return exactly one <json>...</json> block per message.

tools_info:
  - name: "run"
    description: "Run a shell command in the sandbox workspace."
    kwargs_schema:
      cmd: { type: "string", description: "Shell command to execute." }
      cwd: { type: "string", description: "Working directory relative to sandbox root.", default: "." }
      timeout_sec: { type: "number", description: "Timeout in seconds.", default: 180 }

  - name: "read_file"
    description: "Read a text file from the sandbox workspace."
    kwargs_schema:
      path: { type: "string", description: "Path relative to sandbox root." }

  - name: "write_file"
    description: "Write text content to a file in the sandbox workspace (overwrite)."
    kwargs_schema:
      path: { type: "string", description: "Path relative to sandbox root." }
      content: { type: "string", description: "Full file content to write." }

  - name: "list_dir"
    description: "List files under a directory in the sandbox workspace."
    kwargs_schema:
      path: { type: "string", description: "Directory path relative to sandbox root.", default: "." }

  - name: "file_exists"
    description: "Check whether a file exists in the sandbox workspace."
    kwargs_schema:
      path: { type: "string", description: "Path relative to sandbox root." }

  - name: "hash_file"
    description: "Compute SHA256 of a file."
    kwargs_schema:
      path: { type: "string", description: "Path relative to sandbox root." }

inputs:
  data:
    - path: data/zll_events.root
      acquisition:
        method: fetch_script
        script: scripts/fetch_zll_data.sh
        url_env: ATLAS_ZLL_URL
        sha256_env: ATLAS_ZLL_SHA256

  scripts:
    - path: analysis/run_analysis.py
    - path: analysis/fit_mll.py
      note: "This file contains an intentionally missing block to be implemented."

expected_outputs:
  fit_results:
    path: fit_results.json
    schema:
      mZ_hat: float
      sigma_hat: float
      yield_hat: float
      chi2_ndf: float

  plot:
    path: mll_fit.png

scoring:
  metrics:
    mZ_hat:
      reference: 91.2
      tolerance: 1.0
      weight: 0.35
    sigma_hat:
      tolerance: 0.5
      weight: 0.15
    chi2_ndf:
      tolerance: 1.0
      weight: 0.10
  artifacts:
    files_exist:
      weight: 0.20
    plot_generated:
      weight: 0.20

runner_hints:
  runtime_limit_sec: 1200
  seed: 123
  data_policy: "fetch_by_benchmark"
  recommended_entrypoint: "python analysis/run_analysis.py"
  patch_target_suggestion: "analysis/fit_mll.py"
