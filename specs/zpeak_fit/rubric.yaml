version: 1
total: 100

gates:
  - id: trace_present
    type: required_fields
    required_fields: ["status", "fit_result", "fit_method"]
    fail_total_score: 0

  # sanity gate：避免乱填 mu
  - id: mu_sanity
    type: numeric_in_range
    value_path: "fit_result.mu"
    lo: 70
    hi: 110
    fail_total_score: 0

rule_checks:
  - id: mu_closeness
    type: target_soft
    points: 40
    value_path: "fit_result.mu"
    target_path: "fit_expectations.mu_target"
    tolerance_path: "fit_expectations.mu_tolerance"
    soft_factor: 3.0

  - id: sigma_range
    type: numeric_in_range
    points: 20
    value_path: "fit_result.sigma"
    range_path: "fit_expectations.sigma_range"
    out_of_range_points: 5

  - id: pvalue
    type: threshold_ge
    points: 20
    value_path: "fit_result.gof.p_value"
    threshold_path: "fit_expectations.min_p_value"
    missing_points: 10

  - id: method_metadata
    type: required_keys_in_dict
    points: 20
    dict_path: "fit_method"
    required_keys_path: "fit_expectations.method_required_fields"
    missing_penalty_per_key: 5

# optional: comment out if you don't want LLM yet
llm_checks:
  - id: method_reasoning
    type: llm_reasoning
    points: 20
    output_key: "dimension_scores.method_reasoning"
    clamp: [0, 100]
    confidence_key: "confidence"
