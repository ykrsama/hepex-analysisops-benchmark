id: t001_zpeak_fit
type: zpeak_fit
mode: call_white        # mock | call_white

# --- data requirements ---
needs_data: true
release: 2025e-13tev-beta
dataset: data
skim: 2muons
protocol: https
max_files: 1
workers: 1
cache: true
reuse_existing: true

# --- spec bundle files (convention) ---
rubric_path: rubric.yaml
eval_ref_path: eval_ref.yaml

# optional prompts
white_prompt_path: white_prompt.md
judge_prompt_path: judge_prompt.md   # only needed if llm_checks exists

description: "Build m_mumu and fit around Z peak."
constraints:
  time_limit_sec: 600
  memory_gb: 8
  allow_network: false
